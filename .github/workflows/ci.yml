name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check pretia/ tests/

      - name: Format check
        run: ruff format --check pretia/ tests/

      - name: Unit tests
        # Exit 5 = no tests collected, tolerated while the scaffold has no tests yet.
        run: |
          status=0
          pytest tests/unit/ -v --tb=short || status=$?
          if [ "$status" -ne 0 ] && [ "$status" -ne 5 ]; then exit "$status"; fi
